<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR LANCHES - Cardápio Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; } /* Faz o deslize ser suave */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body { background-color: #f9f9f9; padding-top: 80px; }

        /* Cabeçalho Fixo */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: white;
            border-bottom: 2px solid #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .menu-btn {
            font-size: 30px;
            cursor: pointer;
            padding: 5px;
        }

        .logo { font-size: 1.8rem; font-weight: bold; font-style: italic; }

        /* Menu Lateral (Drawer) */
        aside {
            position: fixed;
            left: -250px; /* Escondido por padrão */
            top: 70px;
            width: 250px;
            height: calc(100% - 70px);
            background: #fff;
            border-right: 2px solid #000;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
            z-index: 999;
        }

        aside.active { left: 0; } /* Classe que o JS vai ativar */

        aside a {
            text-decoration: none;
            color: black;
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            transition: background 0.2s;
        }

        aside a:hover { background: #eee; }

        /* Conteúdo do Cardápio */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            background: #000;
            color: #fff;
            padding: 10px;
            margin: 40px 0 20px 0;
            text-transform: uppercase;
        }

        /* Itens do Cardápio - 1 por linha */
        .cardapio-item {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            gap: 20px;
        }

        .cardapio-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .item-info { flex-grow: 1; }
        .item-name { font-size: 1.2rem; font-weight: bold; }
        .item-price { font-size: 1.1rem; color: #d32f2f; font-weight: bold; margin-top: 5px; }

        /* Rodapé WhatsApp */
        footer {
            margin: 50px auto;
            max-width: 600px;
            border: 2px solid #000;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: white;
        }

        .fa-whatsapp { color: #25d366; font-size: 35px; }
        .zap-text { font-size: 1.2rem; font-weight: bold; }

        @media (max-width: 500px) {
            .cardapio-item { flex-direction: column; text-align: center; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo">PR LANCHES</div>
        <div style="width: 40px; height: 40px; background: yellow; border-radius: 50%; border: 1px solid #000;"></div>
    </header>

    <aside id="sidebar">
        <a href="#entradas" onclick="toggleMenu()">Entradas</a>
        <a href="#lanches" onclick="toggleMenu()">Lanches</a>
        <a href="#pasteis" onclick="toggleMenu()">Pastéis</a>
        <a href="#bebidas" onclick="toggleMenu()">Bebidas</a>
    </aside>

    <div class="container">
        
        <h2 class="section-title" id="entradas">Entradas</h2>
        
        <div class="cardapio-item">
            <img src="https://images.unsplash.com/photo-1580476262798-bddd9f4b7369?q=80&w=200&auto=format&fit=crop" alt="Peixe">
            <div class="item-info">
                <div class="item-name">Peixe Frito (400g)</div>
                <div class="item-price">28 R$</div>
            </div>
        </div>

        <div class="cardapio-item">
            <img src="https://images.unsplash.com/photo-1573015084245-51d99eead3bd?q=80&w=200&auto=format&fit=crop" alt="Batata">
            <div class="item-info">
                <div class="item-name">Batatas Fritas (250g)</div>
                <div class="item-price">16 R$</div>
            </div>
        </div>

        <h2 class="section-title" id="lanches">Lanches</h2>
        
        <div class="cardapio-item">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=200&auto=format&fit=crop" alt="Hambúrguer">
            <div class="item-info">
                <div class="item-name">X-Burguer Tradicional</div>
                <div class="item-price">10 R$</div>
            </div>
        </div>

        <div class="cardapio-item">
            <img src="https://images.unsplash.com/photo-1550317138-10000687ad32?q=80&w=200&auto=format&fit=crop" alt="Hot Dog">
            <div class="item-info">
                <div class="item-name">Hot Bacon Especial</div>
                <div class="item-price">14 R$</div>
            </div>
        </div>

        <h2 class="section-title" id="pasteis">Pastéis</h2>
        
        <div class="cardapio-item">
            <img src="https://images.unsplash.com/photo-1626074353765-517a681e40be?q=80&w=200&auto=format&fit=crop" alt="Pastel">
            <div class="item-info">
                <div class="item-name">Pastel de Carne</div>
                <div class="item-price">10 R$</div>
            </div>
        </div>

        <h2 class="section-title" id="bebidas">Bebidas</h2>
        
        <div class="cardapio-item">
            <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=200&auto=format&fit=crop" alt="Refri">
            <div class="item-info">
                <div class="item-name">Refri Lata 350ml</div>
                <div class="item-price">8 R$</div>
            </div>
        </div>

    </div>

    <footer>
        <i class="fab fa-whatsapp"></i>
        <div class="zap-text">Qualquer dúvida chame no zap (12) 12345-6789</div>
    </footer>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }
    </script>

</body>
</html>
